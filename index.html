
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周易六爻算卦 - 天地玄机</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Crimson Text"', 'Georgia', '"Songti SC"', 'STSong', '"SimSun"', 'serif'],
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"PingFang SC"', '"Microsoft YaHei"', '"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        obsidian: '#0B0F19',
                        gold: {
                            100: '#FDF7E5',
                            300: '#F2DF8E',
                            500: '#D4AF37',
                            700: '#9E8022',
                            900: '#5C4A11',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'pulse-glow': 'pulse-glow 4s ease-in-out infinite',
                        'spin-slow': 'spin 60s linear infinite',
                        'spin-slow-reverse': 'spin 80s linear infinite reverse',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: '0.4', filter: 'blur(40px)' },
                            '50%': { opacity: '0.7', filter: 'blur(60px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-color: #F5F5F0;
            --text-color: #111111;
            --accent-color: #8B1D1D; /* 沉稳的朱砂红 */
            --panel-bg: rgba(245, 245, 240, 0.9);
            --panel-border: rgba(17, 17, 17, 0.1);
            --panel-shadow: 0 4px 40px rgba(0, 0, 0, 0.05);
            --btn-bg: #111111;
            --btn-text: #F5F5F0;
            --input-bg: transparent;
            --input-border: rgba(17, 17, 17, 0.2);
            --input-text: #111111;
            --input-focus-border: #111111;
            --prose-text: #333333;
            --noise-opacity: 0.03;
        }

        .dark {
            --bg-color: #080808; /* 极简墨黑 */
            --text-color: #EFEFEF;
            --accent-color: #A32626; /* 暗黑下的朱砂红 */
            --panel-bg: rgba(8, 8, 8, 0.95);
            --panel-border: rgba(239, 239, 239, 0.1);
            --panel-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
            --btn-bg: #EFEFEF;
            --btn-text: #080808;
            --input-bg: transparent;
            --input-border: rgba(239, 239, 239, 0.2);
            --input-text: #EFEFEF;
            --input-focus-border: #EFEFEF;
            --prose-text: rgba(239, 239, 239, 0.85);
            --noise-opacity: 0.04;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            transition: background-color 0.8s cubic-bezier(0.16, 1, 0.3, 1), color 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* 胶片噪点背景，替代原有的光晕星空，更具有艺术质感 */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -2;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: var(--noise-opacity);
            pointer-events: none;
        }

        .stars { display: none; } /* 弃用千篇一律的星空效果 */
        
        /* 极简卡片 */
        .glass-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            box-shadow: var(--panel-shadow);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* 品牌核心文字色 */
        .accent-text {
            color: var(--text-color);
        }

        .gold-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--btn-bg);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gold-btn::after {
            display: none;
        }

        .gold-btn:hover {
            transform: scale(0.98);
        }

        /* Input specific styles */
        .premium-input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 0;
            color: var(--input-text);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .premium-input:focus {
            background: var(--input-bg);
            border-color: var(--input-focus-border);
            outline: none;
            box-shadow: none;
        }

        /* Result formatting */
        .prose-premium p {
            color: var(--prose-text) !important;
            line-height: 2;
            letter-spacing: 0.05em;
            transition: color 0.5s ease;
        }
        .prose-premium h3 {
            color: var(--text-color) !important;
            border-left-color: var(--accent-color) !important;
            border-left-width: 2px;
            padding-left: 1rem;
        }
        
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body class="min-h-screen transition-colors duration-500 light">
    <script>
        // Check for saved theme preference or system preference
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <div class="ambient-bg"></div>
    <div class="stars"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
