
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周易六爻算卦 - 天地玄机</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif SC"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        obsidian: '#0B0F19',
                        gold: {
                            100: '#FDF7E5',
                            300: '#F2DF8E',
                            500: '#D4AF37',
                            700: '#9E8022',
                            900: '#5C4A11',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'pulse-glow': 'pulse-glow 4s ease-in-out infinite',
                        'spin-slow': 'spin 60s linear infinite',
                        'spin-slow-reverse': 'spin 80s linear infinite reverse',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: '0.4', filter: 'blur(40px)' },
                            '50%': { opacity: '0.7', filter: 'blur(60px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-color: #F8FAFC;
            --text-color: #020617;
            --gold-text-gradient: linear-gradient(135deg, #B48A28 0%, #D4AF37 40%, #B48A28 60%, #9E8022 100%);
            --panel-bg: rgba(255, 255, 255, 0.8);
            --panel-border: rgba(212, 175, 55, 0.4);
            --panel-shadow: 0 20px 40px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            --btn-text: #F8FAFC;
            --input-bg: rgba(255, 255, 255, 0.6);
            --input-border: rgba(212, 175, 55, 0.4);
            --input-text: #020617;
            --input-focus-bg: rgba(255, 255, 255, 0.95);
            --ambient-1: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.15) 0%, transparent 40%);
            --ambient-2: radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.12) 0%, transparent 40%);
            --prose-text: rgba(15, 23, 42, 0.85);
            --stars-opacity: 0.05;
            --stars-img1: rgba(0,0,0,0.8);
            --stars-img2: rgba(0,0,0,0.6);
            --stars-img4: rgba(0,0,0,0.4);
        }

        .dark {
            --bg-color: #040914; /* Deep obsidian */
            --text-color: #f1f5f9;
            --gold-text-gradient: linear-gradient(135deg, #FDF7E5 0%, #D4AF37 40%, #D4AF37 60%, #9E8022 100%);
            --panel-bg: rgba(11, 15, 25, 0.6);
            --panel-border: rgba(212, 175, 55, 0.15);
            --panel-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            --btn-text: #040914;
            --input-bg: rgba(4, 9, 20, 0.5);
            --input-border: rgba(212, 175, 55, 0.2);
            --input-text: #FDF7E5;
            --input-focus-bg: rgba(11, 15, 25, 0.8);
            --ambient-1: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 40%);
            --ambient-2: radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.05) 0%, transparent 40%);
            --prose-text: rgba(241, 245, 249, 0.8);
            --stars-opacity: 0.2;
            --stars-img1: #ffffff;
            --stars-img2: rgba(255,255,255,0.8);
            --stars-img4: rgba(255,255,255,0.6);
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        
        /* Ambient Backgrounds */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -2;
            background-image: var(--ambient-1), var(--ambient-2);
            transition: background-image 0.5s ease;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, var(--stars-img1), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, var(--stars-img2), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #D4AF37, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 100px, var(--stars-img4), rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: float 20s linear infinite;
            opacity: var(--stars-opacity);
            transition: opacity 0.5s ease;
        }
        
        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--panel-border);
            box-shadow: var(--panel-shadow);
            transition: all 0.5s ease;
        }
        
        /* Premium Text & Buttons */
        .gold-text-gradient {
            background: var(--gold-text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
        }

        .gold-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #9E8022 100%);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(253, 247, 229, 0.4);
            color: var(--btn-text);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gold-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg) translateX(-100%);
            transition: transform 0.6s ease;
        }

        .gold-btn:hover {
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        .gold-btn:hover::after {
            transform: rotate(45deg) translateX(100%);
        }

        /* Input specific styles */
        .premium-input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--input-text);
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
        }
        .premium-input:focus {
            background: var(--input-focus-bg);
            border-color: rgba(212, 175, 55, 0.8);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15), inset 0 2px 5px rgba(0,0,0,0.05);
            outline: none;
        }

        /* Result formatting */
        .prose-premium p {
            color: var(--prose-text) !important;
            line-height: 1.8;
            letter-spacing: 0.02em;
            transition: color 0.5s ease;
        }
        .prose-premium h3 {
            color: #D4AF37 !important;
            border-left-color: #D4AF37 !important;
        }
        
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body class="min-h-screen transition-colors duration-500 light">
    <script>
        // Check for saved theme preference or system preference
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <div class="ambient-bg"></div>
    <div class="stars"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
