<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#151515" />
      <stop offset="100%" stop-color="#050505" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bgGrad)" rx="112" />

  <!-- Outer Ring with Red Glow -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="#8B1D1D" stroke-width="6" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Inner Ring Minimal -->
  <circle cx="256" cy="256" r="128" fill="none" stroke="#EFEFEF" stroke-width="2" opacity="0.1" />

  <!-- Hexagram (泰卦: Di Tian Tai) - Symbolizing Peace/Harmony -->
  <g transform="translate(180, 166)">
    <!-- Kun (Earth) - Yin lines -->
    <path d="M 0 0 h 64 M 88 0 h 64" stroke="#EFEFEF" stroke-width="16" stroke-linecap="round" />
    <path d="M 0 36 h 64 M 88 36 h 64" stroke="#EFEFEF" stroke-width="16" stroke-linecap="round" />
    <path d="M 0 72 h 64 M 88 72 h 64" stroke="#EFEFEF" stroke-width="16" stroke-linecap="round" />

    <!-- Qian (Heaven) - Yang lines -->
    <path d="M 0 108 h 152" stroke="#EFEFEF" stroke-width="16" stroke-linecap="round" />
    <path d="M 0 144 h 152" stroke="#EFEFEF" stroke-width="16" stroke-linecap="round" />
    <path d="M 0 180 h 152" stroke="#EFEFEF" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>
